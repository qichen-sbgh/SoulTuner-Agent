services:
  graphzep-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3100:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    env_file:
      - ../.env  # 从项目根目录读取 OPENAI_API_KEY / OPENAI_BASE_URL / MODEL_NAME / NEO4J_PASSWORD 等
    environment:
      # 容器内部固定使用 3000，宿主机统一映射到 3100
      - PORT=3000
      # Neo4j 连接宿主机，地址需要替换成 Docker 内网地址
      - NEO4J_URI=bolt://host.docker.internal:7687
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - graphzep-network

  # MCP Server (optional)
  mcp-server:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    ports:
      - "8351:3001"
    env_file:
      - ../.env  # 从项目根目录读取所有环境变量
    environment:
      # 同理，MCP Server 内部端口固定 3001（宿主机映射到 8351）
      - PORT=3001
      - NEO4J_URI=bolt://host.docker.internal:7687
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - graphzep-network

networks:
  graphzep-network:
    driver: bridge
