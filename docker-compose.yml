# ============================================================
# SoulTuner-Agent Docker Compose
# 一键启动所有服务: docker compose up -d
# ============================================================

name: soultuner-agent

services:
  # ---- Neo4j 图数据库 ----
  neo4j:
    image: neo4j:2026-enterprise
    container_name: soultuner-neo4j
    ports:
      - "7474:7474"       # Neo4j Browser (http://localhost:7474)
      - "7687:7687"       # Bolt 协议
    environment:
      # ★ 口令从 .env 读取（NEO4J_PASSWORD）。首次部署请在 .env 设置强口令；下方默认仅为本地开发兜底。
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme_dev_only}
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "eval"   # Enterprise 评估许可证（非商业免费）
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      # 如果有 dump 文件，挂载到 /seed 用于首次恢复
      # - ./docker/neo4j-seed:/seed
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---- GraphZep 记忆服务 ----
  graphzep:
    profiles: ["cpu", "gpu"]
    build: ./graphzep_service
    container_name: soultuner-graphzep
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "3100:3100"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-changeme_dev_only}"
      OPENAI_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      OPENAI_API_KEY: ${DASHSCOPE_API_KEY}
      MODEL_NAME: ${GRAPHZEP_MODEL_NAME:-qwen3.7-plus}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-BAAI/bge-m3}
      PORT: "3100"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---- Python 后端 API ----
  backend:
    build: .
    container_name: soultuner-backend
    # 运行时从项目私有 .env 注入密钥；.env 已被 Git 与 Docker build context 排除。
    # 使用 env_file 可避免宿主机同名环境变量覆盖项目内的私有配置。
    env_file:
      - .env
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-changeme_dev_only}"
      GRAPHZEP_BASE_URL: http://graphzep:3100
      MODEL_NAME: ${MODEL_NAME:-qwen3.7-plus}
      MUSIC_AUDIO_DATA_DIR: /app/data/processed_audio/audio
      MUSIC_DATA_ROOT: /app/data
      MUSIC_WEB_SEARCH_ENABLED: "1"
      MUSIC_INLINE_INGEST_ENABLED: "0"
      MUSIC_INGEST_QUEUE_DIR: /app/data/ingest_queue
      NETEASE_API_BASE: http://netease:3000
      # 默认允许缺失的 HuggingFace 文本编码器自动下载，保证 CPU/GPU 一键启动后向量检索可用。
      # 如需完全离线运行，可在 .env 设置 HF_OFFLINE=true 并提前准备本地缓存。
      HF_OFFLINE: ${HF_OFFLINE:-false}
      HF_HOME: /root/.cache/huggingface
      HF_HUB_CACHE: /root/.cache/huggingface/hub
      HF_ENDPOINT: ${HF_ENDPOINT:-https://huggingface.co}
      HF_HUB_DISABLE_XET: ${HF_HUB_DISABLE_XET:-1}
      # 本地模型推理（可选，通过宿主机暴露的 vLLM 端口）
      VLLM_BASE_URL: ${VLLM_BASE_URL:-http://host.docker.internal:8000/v1}
    volumes:
      # 音乐数据：挂载宿主机的音频/封面/歌词目录
      - ${MUSIC_DATA_PATH:-./data}:/app/data
      # M2D-CLAP 模型权重：挂载宿主机缓存，避免容器内重复下载 (~1.6GB)
      - ${M2D_CLAP_CACHE:-~/.cache/m2d_clap}:/root/.cache/m2d_clap
      # HuggingFace 模型缓存：挂载宿主机缓存（BERT 文本编码器等）
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s  # M2D-CLAP 模型预热约 15-30s

  # ---- 离线音乐增强 Worker（GPU 模式）----
  # 在线 API 只写元数据和任务队列；该 Worker 独立完成歌词标签与音频向量提取。
  ingest-worker:
    profiles: ["gpu"]
    build: .
    container_name: soultuner-ingest-worker
    command: ["python", "scripts/ingest_worker.py", "--watch"]
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-changeme_dev_only}"
      MUSIC_INGEST_QUEUE_DIR: /app/data/ingest_queue
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      HF_OFFLINE: ${HF_OFFLINE:-false}
      HF_HOME: /root/.cache/huggingface
      HF_HUB_CACHE: /root/.cache/huggingface/hub
      HF_ENDPOINT: ${HF_ENDPOINT:-https://huggingface.co}
      HF_HUB_DISABLE_XET: ${HF_HUB_DISABLE_XET:-1}
    volumes:
      - ${MUSIC_DATA_PATH:-./data}:/app/data
      - ${M2D_CLAP_CACHE:-~/.cache/m2d_clap}:/root/.cache/m2d_clap
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ---- 联网元搜索（CPU / GPU 模式）----
  searxng:
    profiles: ["cpu", "gpu"]
    image: searxng/searxng:latest
    container_name: soultuner-searxng
    ports:
      - "8888:8080"
    restart: unless-stopped

  # ---- 网易云音乐代理（CPU / GPU 模式）----
  netease:
    profiles: ["cpu", "gpu"]
    image: binaryify/netease_cloud_music_api:v4.26.0
    container_name: soultuner-netease
    ports:
      - "3000:3000"
    restart: unless-stopped

  # ---- Next.js 前端 ----
  frontend:
    build: ./web
    container_name: soultuner-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3003:3003"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8501
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
